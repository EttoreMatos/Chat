<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="./css/style.css?v=20260723m">
    <title>FastChat</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <section class="container" id="login">
        <div class="login__brand">
            <h1>FastChat</h1>
            <p>Entre e converse em tempo real</p>
        </div>

        <div class="login-shell">
            <div class="Preview-avatar" id="avatarPreview">
                <span class="material-symbols-outlined Preview-avatar__icon" aria-hidden="true">image</span>
                <img class="Preview-avatar__img" id="avatarPreviewImg" alt="" hidden>
            </div>

            <section class="login">
                <form class="login__form">
                    <label class="custom-file-upload">
                        <input type="file" class="login__avatar" accept="image/*" />
                        Escolher foto do perfil
                    </label>

                    <div class="input-group">
                        <input type="text" class="login__input" id="nome" required placeholder=" " maxlength="32" />
                        <label for="nome">Seu nome:</label>
                    </div>

                    <div class="input-group">
                        <input type="text" class="des__input" id="des" placeholder=" " maxlength="120">
                        <label for="des">Descrição(opcional):</label>
                    </div>

                    <button type="submit" class="login__button">Entrar</button>

                    <div class="recaptcha-container">
                        <div class="g-recaptcha" data-sitekey="6LeYxYsrAAAAAKHfczL8MgAs1XBXQKQAUgyf7vvJ" data-theme="dark"></div>
                    </div>
                </form>
            </section>
        </div>
    </section>

    <div class="app" id="app" hidden>
        <header class="app__topbar">
            <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir membros">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="app__logo">FastChat</h1>
            <span class="app__online" id="onlineCount">0 online</span>
            <div class="reconnect-banner" id="reconnectBanner" hidden role="status" aria-live="polite">
                <span class="material-symbols-outlined" aria-hidden="true">wifi_off</span>
                <span id="reconnectBannerText">Reconectando…</span>
            </div>
        </header>

        <aside class="sidebar" aria-label="Membros">
            <div class="sidebar__section-label">Membros</div>
            <ul class="sidebar__users" id="userList"></ul>
            <div class="sidebar__footer">
                <img class="topo-avatar" src="" alt="">
                <div class="sidebar__me">
                    <span class="topo-nome"></span>
                    <button type="button" class="sair" id="logoutBtn">Sair</button>
                </div>
            </div>
        </aside>

        <main class="chat" id="chat">
            <section class="chat__messages" id="chatMessages"></section>

            <div class="typing-indicator" id="typingIndicator" hidden></div>

            <div class="preview-bar" id="previewBar" hidden>
                <div class="preview-bar__media" id="previewMedia"></div>
                <button type="button" class="preview-bar__clear" id="clearPreview" aria-label="Remover anexo">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form class="chat__form" id="chatForm">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <input type="file" id="audioInput" accept="audio/*,.mp3,.ogg,.wav,.m4a,.webm,.aac" hidden>

                <div class="attach-menu-wrap">
                    <button type="button" class="chat__attach" id="clipBtn" title="Anexar arquivo" aria-label="Anexar arquivo" aria-expanded="false">
                        <span class="material-symbols-outlined">attach_file</span>
                    </button>
                    <div class="attach-menu" id="attachMenu" hidden>
                        <button type="button" class="attach-menu__item" id="attachImageBtn">
                            <span class="material-symbols-outlined">image</span>
                            Imagem
                        </button>
                        <button type="button" class="attach-menu__item" id="attachAudioBtn">
                            <span class="material-symbols-outlined">audio_file</span>
                            Áudio
                        </button>
                    </div>
                </div>

                <button type="button" class="chat__attach" id="stickerBtn" title="Emojis" aria-label="Emojis">
                    <span class="material-symbols-outlined">mood</span>
                </button>
                <button type="button" class="chat__attach" id="audioBtn" title="Gravar áudio" aria-label="Gravar áudio">
                    <span class="material-symbols-outlined" id="audioBtnIcon">mic</span>
                </button>
                <div class="composer-wrap">
                    <ul class="mention-popup" id="mentionPopup" hidden></ul>
                    <div class="sticker-picker" id="stickerPicker" hidden></div>
                    <textarea class="chat__input" id="chatInput" placeholder="Digite uma mensagem" rows="1"></textarea>
                </div>
                <button type="submit" class="chat__button" aria-label="Enviar">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </form>
        </main>
    </div>

    <div id="profileModal" class="modal" hidden>
        <div id="profileCard" class="modal__card" role="dialog" aria-modal="true">
            <img id="profileImage" src="" alt="Avatar">
            <h3 id="profileName"></h3>
            <p id="profileDesc"></p>
        </div>
    </div>

    <div id="imageModal" class="modal" hidden>
        <img id="lightboxImage" class="modal__lightbox" alt="Imagem ampliada">
    </div>

    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

    <audio id="alert" preload="auto">
        <source src="audios_chat/alerta.mp3" type="audio/mpeg">
    </audio>
    <audio id="connect" preload="auto">
        <source src="audios_chat/connect.mp3" type="audio/mpeg">
    </audio>
    <audio id="disconnect" preload="auto">
        <source src="audios_chat/disconnect.mp3" type="audio/mpeg">
    </audio>

    <script src="./js/script.js?v=20260723m" defer></script>
</body>
</html>
